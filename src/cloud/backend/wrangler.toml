name = "fireproof-cloud"
main = "server.ts"
compatibility_date = "2024-04-19"
# compatibility_flags = ["nodejs_compat"]
# upload_source_maps = true

[durable_objects]
bindings = [
  { name = "FP_META_GROUPS", class_name = "FPMetaGroups"},
]


[[migrations]]
tag = "v1" # Should be unique for each entry
new_classes = ["FPMetaGroups"]

[observability]
enabled = true
head_sampling_rate = 1

[env.test.vars]
VERSION = "FP-MSG-1.0"
STORAGE_URL = "http://localhost:9000/testbucket"
ACCESS_KEY_ID = "minioadmin"
SECRET_ACCESS_KEY = "minioadmin"
FP_DEBUG = "FPMetaGroups"
#FP_FORMAT = "yaml"
# TEST_DATE = "20241121T225359Z"

[env.test.durable_objects]
bindings = [
  { name = "FP_META_GROUPS", class_name = "FPMetaGroups" },
]
